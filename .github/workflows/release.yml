name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build binaries (Linux x86_64)
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libxcb1-dev \
            libclang-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-x86_64
          workspaces: |
            .
            client

      - name: Build server
        run: cargo build --release --bin telemuze

      - name: Build dist launcher
        env:
          TELEMUZE_SERVER_BIN: ${{ github.workspace }}/target/release/telemuze
          TELEMUZE_SHERPA_SO: ${{ github.workspace }}/target/release/libsherpa-onnx-c-api.so
          TELEMUZE_ONNXRUNTIME_SO: ${{ github.workspace }}/target/release/libonnxruntime.so
        run: cargo build --release -p telemuze-dist

      - name: Build client
        working-directory: client
        run: cargo build --release --bin telemuze-listen

      - name: Stage release artifacts
        run: |
          mkdir -p artifacts
          cp target/release/telemuze                  artifacts/telemuze-server-linux-x86_64
          cp target/release/telemuze-dist             artifacts/telemuze-linux-x86_64
          cp client/target/release/telemuze-listen    artifacts/telemuze-listen-linux-x86_64
          cp target/release/libsherpa-onnx-c-api.so   artifacts/
          cp target/release/libonnxruntime.so         artifacts/
          ls -lh artifacts/

      - name: Upload artifacts for release job
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: artifacts/
          retention-days: 7

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          version="${{ needs.build.outputs.version }}"
          # Strip leading v for the version tag
          version_no_v="${version#v}"
          {
            echo "tags<<EOF"
            echo "${{ env.IMAGE_NAME }}:${version}"
            echo "${{ env.IMAGE_NAME }}:${version_no_v}"
            echo "${{ env.IMAGE_NAME }}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub release
    runs-on: ubuntu-22.04
    needs: [build, docker]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-x86_64
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
