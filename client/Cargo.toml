[package]
name = "telemuze-listen"
version = "0.1.0"
edition = "2021"
description = "Streaming transcription client for Telemuze"

[[bin]]
name = "telemuze-listen"
path = "src/main.rs"

[dependencies]
# Audio capture
cpal = "0.15"

# VAD engine (same as server)
vad-rs = { git = "https://github.com/cjpais/vad-rs", default-features = false }

# HTTP client for sending audio to server
reqwest = { version = "0.12", features = ["blocking", "multipart", "json"] }

# WAV encoding
hound = "3"

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Serialization
serde_json = "1"

# Signal handling
signal-hook = "0.3"

# System tray (XEmbed protocol for X11)
x11rb = { version = "0.13", features = ["allow-unsafe-code"] }

# Utilities
anyhow = "1"
dirs-next = "2"
